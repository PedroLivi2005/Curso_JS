<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ex009 HTML</title>
</head>
<body>
    <h1>Diga seu país</h1>
    <input type="text" name="txtpais" id="txtpais">
    <input type="button" value="Verificar" onclick="analise()">

    <div id="res">

    </div>

    <script>
        function analise() {
            var pais = window.document.querySelector('input#txtpais').value
            var res = window.document.querySelector('div#res')
            res.innerHTML = `<p>Vivendo em ${pais}</p>`
            
            if (pais != 'Brasil') {
                res.innerHTML += '<p>Você é Estrangeiro!</p>'
            } else {
                res.innerHTML += '<p>Você é Brasileiro!</p>'
            }
        }
    </script>
</body>
</html>
